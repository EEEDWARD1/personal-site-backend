spring:
  application:
    name: backend-java
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000